id: policy.external_call_gate
name: External Call Gate Policy
scope: AGENT
trigger:
  and:
    - "==":
        - var: action.type
        - external_call
    - "!=":
        - var: action.approved
        - true
action: DENY
message: External API call attempted without explicit approval. All external communications require prior authorization. Request denied.
log_level: WARN
notify_human: true
audit_on_trigger: true
escalation_target: HUMAN
cooldown_sec: 0
enabled: true
author: security.operations
metadata:
  created_at: 2026-04-05T00:00:00Z
  version: "1.0.0"
  category: "access_control"
  risk_level: "HIGH"
